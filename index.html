<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome to Venniverse</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lexend+Peta:wght@400;900&family=Archivo+Black&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.0.2/anime.min.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-base: #e0c6fb;
            --accent-pink: #f9a7e2; 
            --deep-purple: #5f1b81;
            --btn-bg: #e3acf4;
            --glass: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Ensures the background image fills the screen without stretching */
            background-image: url('image/bg.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed; /* Keeps bg still while scrolling on desktop */
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            
            /* Crucial for mobile: prevents petals from causing horizontal scroll */
            overflow-x: hidden; 
            font-family: 'Comic Sans MS', 'cursive', sans-serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        }
/* Mobile Specific Background Adjustment */
@media (max-width: 768px) {
    body {
        /* On mobile, 'fixed' often causes glitches; 'scroll' is safer */
        background-attachment: scroll;
        /* Ensures the background covers the entire height even if content grows */
        background-repeat: no-repeat;
        background-size: cover;
    }

    .window {
        width: 100%;
        margin-top: 20px;
        margin-bottom: 80px; /* Space so bottom nav doesn't cover content */
    }
}
        #flower-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1; 
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 650px;
            padding: 35px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(95, 27, 129, 0.2);
            text-align: center;
        }

        .character-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 5px solid rgb(243, 236, 250);
            overflow: hidden;
            margin-bottom: 35px; /* Spacing fixed to prevent line overlap */
            background: rgba(234, 203, 250, 0.2);
            box-shadow: 0 10px 25px rgba(95, 27, 129, 0.15);
            display: flex; justify-content: center; align-items: center;
        }

        .character-circle img { width: 100%; height: 100%; object-fit: cover; }

        .welcome-text {
            font-family: 'Lexend Peta', sans-serif;
            font-size: 0.7rem;
            color: var(--deep-purple);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 18px;
            border-radius: 50px;
            display: inline-block;
        }

        .title-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.2rem;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            color: white;
            -webkit-text-stroke: 1.5px var(--deep-purple);
            text-shadow: 2px 4px 0px var(--accent-pink);
            line-height: 1.1;
        }

        .title-text .letter { display: inline-block; opacity: 0; }
        .title-text .line {
            position: absolute; left: 0; top: 0; bottom: 0; margin: auto;
            height: 3px; width: 100%; background-color: var(--deep-purple);
            opacity: 0;
        }

        /* RESTORED HOVER BUTTON */
        .play-btn {
            position: relative;
            background: linear-gradient(135deg, #f9a7e2, #e3acf4);
            color: white;
            text-decoration: none;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            padding: 18px 75px;
            border-radius: 50px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            box-shadow: 0 10px 20px rgba(227, 172, 244, 0.4), 
                        inset 0 -5px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            z-index: 1;
            -webkit-text-stroke: 1px var(--deep-purple);
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: all 0.6s;
            z-index: -1;
        }

        .play-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(227, 172, 244, 0.6), 
                        inset 0 -2px 0 rgba(0, 0, 0, 0.1);
            filter: brightness(1.05);
        }

        .play-btn:hover::before { left: 100%; }

        .play-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 5px 10px rgba(227, 172, 244, 0.4);
        }

        @media (max-width: 500px) {
            .title-text { font-size: 2rem; -webkit-text-stroke: 1px var(--deep-purple); }
            .character-circle { width: 120px; height: 120px; margin-bottom: 25px; }
            .container { padding: 25px 15px; }
            .play-btn { padding: 15px 50px; font-size: 1rem; }
        }
    </style>
</head>
<body>
     <audio id="click-sound" src="clicksound2.wav" preload="auto"></audio>
    <canvas id="flower-canvas"></canvas>

    <div class="container">
        <h2 class="welcome-text">Venvenn's Universe</h2>
        
        <div class="character-circle">
            <img src="image/start1.png" alt="Vennie Character">
        </div>

        <div class="content-box">
            <h1 class="title-text">
                <span class="text-wrapper">
                  <span class="line line1"></span>
                  <span class="letters">VENNIVERSE</span>
                  <span class="line line2"></span>
                </span>
            </h1>
            <br>
            <a href="/profile" class="play-btn">Enter</a>
        </div>
    </div>

    <script>
        // Letter Setup
        const textWrapper = document.querySelector('.title-text .letters');
        textWrapper.innerHTML = textWrapper.textContent.replace(/\S/g, "<span class='letter'>$&</span>");

        // Animation Timeline
        anime.timeline({loop: false})
          .add({
            targets: '.title-text .line',
            opacity: [0, 1],
            scaleX: [0, 1],
            easing: "easeInOutExpo",
            duration: 700
          }).add({
            targets: '.title-text .line',
            duration: 600,
            easing: "easeOutExpo",
            translateY: (el, i) => (-0.7 + 1.4 * i) + "em" 
          }).add({
            targets: '.title-text .letter',
            opacity: [0, 1],
            translateX: [40, 0],
            scale: [0.3, 1],
            rotateY: [-90, 0],
            easing: "easeOutExpo",
            duration: 800,
            delay: (el, i) => 70 * i,
            offset: '-=600'
          });

        // Petals
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 6 + 4;
                this.speed = Math.random() * 1.2 + 0.8;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                const colors = ['#f9a7e2', '#dab6fc', '#ffffff', '#e3acf4'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.6 + 0.2;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 100) * 1;
                this.angle += this.spin;
                if (this.y > canvas.height + 20) this.reset();
            }
        }
        for (let i = 0; i < 60; i++) petals.push(new Petal());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Cursor Trail
        document.addEventListener('mousemove', function(e) {
            const heart = document.createElement('div');
            heart.style.position = 'fixed';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1000';
            heart.style.transition = 'all 0.8s ease-out';
            heart.style.transform = 'translate(-50%, -50%)';
            heart.innerHTML = `<svg width="18" height="18" viewBox="0 0 511.999 511.999"><path fill="#FF728B" d="M196.786,357.748C83.906,553.262-87.718,256,138.042,256c-225.761,0-54.136-297.262,58.744-101.747 c-112.881-195.515,230.368-195.515,117.487,0C427.154-41.262,598.779,256,373.018,256c225.761,0,54.136,297.262-58.744,101.748 C427.154,553.262,83.906,553.262,196.786,357.748z"></path></svg>`;
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = `translate(-50%, -80px) scale(0) rotate(${Math.random() * 90}deg)`;
                heart.style.opacity = '0';
            }, 50);
            setTimeout(() => heart.remove(), 800);
        });
        const clickSound = document.getElementById('click-sound');

// Select ALL links on the page
const allLinks = document.querySelectorAll('a');

allLinks.forEach(link => {
    link.addEventListener('click', function(e) {
        // 1. Check if the link is actually going somewhere (has an href)
        if (this.href && !this.href.includes('#')) {
            e.preventDefault(); // Stop navigation
            const targetUrl = this.href;

            clickSound.currentTime = 0;
            clickSound.play();

            // 2. Wait for the sound to start, then navigate
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 150); 
        } else {
            // If it's just a button/anchor without a URL, just play sound
            clickSound.currentTime = 0;
            clickSound.play();
        }
    });
});

// Also play sound for non-link clicks (general background)
window.addEventListener('click', (e) => {
    // Only play if we didn't click a link (to avoid double sound)
    if (!e.target.closest('a')) {
        clickSound.currentTime = 0;
        clickSound.play();
    }
});

(function() {
        
        const currentPath = window.location.pathname;
        if (currentPath.endsWith('.html')) {
            const cleanPath = currentPath.replace(/\.html$/, '');
            window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
        }

        
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.endsWith('.html')) {
                    e.preventDefault();
                    const cleanLink = href.replace(/\.html$/, '');
                    window.history.pushState(null, '', cleanLink);
                    
                    
                    fetch(href)
                        .then(res => res.text())
                        .then(html => {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(html, 'text/html');
                            document.body.innerHTML = doc.body.innerHTML;
                        });
                }
            });
        });
    })();
    </script>
</body>
</html>
