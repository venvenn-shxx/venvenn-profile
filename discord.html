<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Profile</title>
    <style>
        /* Aesthetic Palette */
        :root {
            --window-bg: rgba(254, 247, 255, 0.75);
            --border-dark: #9878a5;
            --white: #ffffff;
            --accent-green: #f0e0f2;
            --text-dark: #634d5d;
            --online: #aed581;
            --idle: #ffd54f;
            --dnd: #e57373;
            --offline: #cfd8dc;
        }

        body {
            background-image: url(image/bg.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column; /* Stack window and button vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px; /* Vertical padding so button isn't squashed */
            box-sizing: border-box;
            overflow-x: hidden; 
            font-family: 'Comic Sans MS', 'cursive', sans-serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        
        }

        #flower-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .window {
            width: 100%;
            max-width: 500px;
            background-color: var(--window-bg);
            border: 4px solid var(--border-dark);
            border-radius: 20px;
            box-shadow: 6px 6px 0px var(--border-dark);
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .title-bar {
            background-color: var(--white);
            border-bottom: 4px solid var(--border-dark);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tab {
            background: var(--white);
            border: 3px solid var(--border-dark);
            border-bottom: none;
            padding: 4px 12px;
            border-radius: 10px 10px 0 0;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .content {
            padding: 20px;
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .content { grid-template-columns: 1fr; text-align: center; }
            .photo-frame { margin: 0 auto; width: 120px; }
        }

        .photo-frame {
            background: var(--white);
            border: 4px solid var(--border-dark);
            border-radius: 15px;
            padding: 10px;
            position: relative;
        }

        .avatar {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 4px solid var(--border-dark);
            display: block;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 24px; height: 24px;
            background-color: var(--offline);
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            animation: heartBeat 2s infinite ease-in-out;
        }

        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .stats { display: flex; flex-direction: column; gap: 10px; }
        .stat-item label { display: block; font-size: 14px; font-weight: bold; color: var(--text-dark); margin-bottom: 4px; }
        .slider-bg { height: 18px; background: var(--white); border: 3px solid var(--border-dark); border-radius: 10px; overflow: hidden; }
        .slider-fill { height: 100%; background: var(--border-dark); width: 0%; transition: width 1s ease-in-out; }

        .info-container { padding: 0 20px 20px; }
        .box {
            background: var(--accent-green);
            border: 3px solid var(--border-dark);
            border-radius: 30px;
            padding: 8px;
            font-size: clamp(18px, 5vw, 25px);
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-dark);
        }

        /* --- UPDATED NAVIGATION STYLE (OUTSIDE) --- */
        .bottom-nav {
            position: relative; /* No longer fixed to the screen */
            margin-top: 30px;    /* Space between window and button */
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .home-btn {
            background: var(--white);
            border: 3px solid var(--border-dark);
            border-radius: 10px;
            padding: 10px 30px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 var(--border-dark);
             cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        }

        .home-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--border-dark);
        }

        .home-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--border-dark);
        }
    </style>
</head>
<body>

    <canvas id="flower-canvas"></canvas>

    <div class="window">
        <div class="title-bar">
            <div class="tab">discord.com x</div>
            <div class="window-controls">− ❐ ×</div>
        </div>

        <div class="content">
            <div class="photo-frame">
                <img id="avatar" src="https://via.placeholder.com/100" class="avatar">
                <div id="status" class="status-dot"></div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <label>social 50%</label>
                    <div class="slider-bg"><div class="slider-fill" style="width: 50%;"></div></div>
                </div>
                <div class="stat-item">
                    <label>sleepy 90%</label>
                    <div class="slider-bg"><div class="slider-fill" style="width: 90%;"></div></div>
                </div>
                <div class="stat-item">
                    <label>energy 5%</label>
                    <div class="slider-bg"><div class="slider-fill" style="width: 5%;"></div></div>
                </div>
            </div>
        </div>

        <div class="info-container">
            <div id="display-name" class="box">Loading...</div>
            <div id="username" class="box" style="background: var(--white); font-size: 15px;">@user</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="home-btn">
            <span class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" stroke="#000" stroke-width="0.8">
                        <path fill="#FFA7C0" d="M52 20.65c0-4.7-3.8-8.5-8.5-8.5-3.2 0-6 1.8-7.5 4.5-1.5-2.7-4.3-4.5-7.5-4.5-4.7 0-8.5 3.8-8.5 8.5 0 2 0.7 3.9 1.9 5.3L36 43.5l14.1-17.5c1.2-1.4 1.9-3.3 1.9-5.3z"/>
                        <circle cx="36" cy="55" r="5" fill="#FFA7C0"/>
                    </g>
                </svg>
            </span> 
            HOME
        </a>
    </nav>

    <script>
        // ... (Keep your existing script for User ID, Petals, and Lanyard) ...
        const USER_ID = '748262928955998360'; 
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 5 + 3;
                this.speed = Math.random() * 0.8 + 0.4;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.curve = Math.random() * 1.5; 
                const colors = ['#e0c3fc', '#dab6fc', '#cc99ff', '#b388ff', '#9575cd'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.style = Math.floor(Math.random() * 3);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.7; 
                ctx.beginPath();
                if (this.style === 0) { ctx.ellipse(0, 0, this.size, this.size / 1.8, 0, 0, Math.PI * 2); }
                else if (this.style === 1) {
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size, -this.size, -this.size, this.size, 0, this.size);
                    ctx.bezierCurveTo(this.size, this.size, this.size, -this.size, 0, 0);
                } else {
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(this.size / 2, this.size, 0, this.size * 2);
                    ctx.quadraticCurveTo(-this.size / 2, this.size, 0, 0);
                }
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 80) * this.curve; 
                this.angle += this.spin;
                if (this.y > canvas.height + 10) this.reset();
            }
        }

        for (let i = 0; i < 60; i++) petals.push(new Petal());

        function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animatePetals);
        }
        animatePetals();

        async function fetchLanyard() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await response.json();
                document.getElementById('display-name').textContent = data.discord_user.display_name;
                document.getElementById('username').textContent = `@${data.discord_user.username}`;
                document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${USER_ID}/${data.discord_user.avatar}.webp?size=160`;
                const statusDot = document.getElementById('status');
                const colors = { online: 'var(--online)', idle: 'var(--idle)', dnd: 'var(--dnd)', offline: 'var(--offline)' };
                statusDot.style.backgroundColor = colors[data.discord_status] || colors.offline;
            } catch (e) { console.error(e); }
        }
        fetchLanyard();
        setInterval(fetchLanyard, 10000);

        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', function(e) {
                const heart = document.createElement('div');
                heart.innerHTML = `<svg width="20" height="20" viewBox="0 0 512 512"><path fill="#FF728B" d="M196.8 357.7C83.9 553.3-87.7 256 138 256c-225.8 0-54.1-297.3 58.7-101.7-112.9-195.5 230.4-195.5 117.5 0C427.2-41.3 598.8 256 373 256c225.8 0 54.1 297.3-58.7 101.7 112.9 195.5-230.4 195.5-117.5 0z"/><circle fill="#FFEB99" cx="255.7" cy="256" r="59.3"/></svg>`;
                heart.style.position = 'fixed';
                heart.style.left = (e.clientX - 10) + 'px';
                heart.style.top = (e.clientY - 10) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '10000';
                heart.style.transition = 'transform 0.8s, opacity 0.8s';
                document.body.appendChild(heart);
                setTimeout(() => {
                    heart.style.transform = `translateY(-40px) scale(0.2)`;
                    heart.style.opacity = '0';
                }, 50);
                setTimeout(() => heart.remove(), 800);
            });
        }
    </script>
</body>
</html>
