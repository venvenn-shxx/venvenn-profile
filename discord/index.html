<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <title>Ven's Discord Profile</title>
    <style>
        /* Aesthetic Palette */
        :root {
            --window-bg: rgba(254, 247, 255, 0.75);
            --border-dark: #9878a5;
            --white: #ffffff;
            --accent-green: #f0e0f2;
            --text-dark: #634d5d;
            --text-sub: #8e708a;
            --online: #aed581;
            --idle: #ffd54f;
            --dnd: #e57373;
            --offline: #cfd8dc;
            --spotify: #1db954;
        }

        /* Base Global Overrides */
        body {
            background-image: url(../image/bg.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden; 
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        }

        #flower-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* Layout Architecture Containers */
        .main-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 650px;
        }

        .window {
            width: 100%;
            max-width: 900px;
            background-color: var(--window-bg);
            border: 4px solid var(--border-dark);
            border-radius: 20px;
            box-shadow: 6px 6px 0px var(--border-dark);
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        /* Top Title Bar Components */
        .title-bar {
            background-color: var(--white);
            border-bottom: 4px solid var(--border-dark);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tab {
            background: var(--white);
            border: 3px solid var(--border-dark);
            border-bottom: none;
            padding: 4px 12px;
            border-radius: 10px 10px 0 0;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .window-controls {
            color: var(--text-dark);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Document Body Content Panels */
        .content {
            padding: 20px 20px 5px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Profile Visual Presentation Card */
        .profile-header-card {
            background: var(--white);
            border: 4px solid var(--border-dark);
            border-radius: 15px;
            padding: 8px;
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 15px;
            align-items: center;
        }

        .photo-frame {
            position: relative;
            height: fit-content;
        }

        .avatar {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 4px solid var(--border-dark);
            display: block;
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 4px; right: 4px;
            width: 24px; height: 24px;
            background-color: var(--offline);
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            animation: heartBeat 2s infinite ease-in-out;
            transition: background-color 0.4s ease;
        }

        @keyframes heartBeat { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.15); } 
        }

        .info-container { 
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .box {
            background: var(--accent-green);
            border: 3px solid var(--border-dark);
            border-radius: 30px;
            padding: 6px 8px;
            font-size: clamp(16px, 4vw, 22px);
            text-align: center;
            font-weight: bold;
            color: var(--text-dark);
        }

        /* Activity / Tracking Layouts */
        .status-container {
            background-color: var(--white);
            padding: 8px;
            border-radius: 15px;
            border: 3px solid var(--border-dark);
            display: block;
        }

        .activity-wrapper {
            display: flex;
            align-items: center;
            justify-content: center; /* Changed from flex-start to center */
            gap: 15px;
        }

        .activity-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-align: center; /* Changed from left to center */
        }

        .activity-gif {
            width: 60px;
            height: 60px;
            object-fit: contain;
            image-rendering: pixelated; 
            flex-shrink: 0;
        }

        .activity-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Flexible Container for the SVG Icon and live text */
        .time-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .activity-time {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            font-variant-numeric: tabular-nums;
        }

        /* Custom Scope for Clock SVG Colors */
        .time-icon-svg {
            width: 14px;
            height: 14px;
            fill: var(--text-sub);
            vertical-align: middle;
        }
        .cls-time-icon {
            fill: var(--border-dark);
        }

        /* Stat Slider Presentation Structure */
        .stats-container { 
            padding: 5px 20px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-dark);
            margin: 2px 0 0 0;
            letter-spacing: 1px;
            text-decoration: underline var(--text-dark);
            text-decoration-thickness: 2px;
        }

        .stat-item label { 
            display: block; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text-dark); 
            margin-bottom: 4px; 
        }

        .slider-bg { 
            height: 18px; 
            background: var(--white); 
            border: 3px solid var(--border-dark); 
            border-radius: 10px; 
            overflow: hidden; 
        }

        .slider-fill { 
            height: 100%; 
            background: #d0aed4;
            width: 0%; 
            transition: width 1s ease-in-out; 
        }

        /* Navigation Controls */
        .side-nav {
            display: flex;
            z-index: 100;
        }

        .home-btn {
            background: var(--white);
            border: 3px solid var(--border-dark);
            border-radius: 10px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 var(--border-dark);
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 511.999 511.999' width='16' height='16'><path fill='%23FF728B' d='M196.786 357.748C83.906 553.262-87.718 256 138.042 256c-225.761 0-54.136-297.262 58.744-101.747-112.881-195.515 230.368-195.515 117.487 0C427.154-41.262 598.779 256 373.018 256c225.761 0 54.136 297.262-58.744 101.748 112.88 195.514-230.368 195.514-117.488 0z'/><circle fill='%23FFEB99' cx='255.711' cy='255.997' r='59.308'/></svg>") 6 6, auto !important;
        }

        .home-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--border-dark);
        }

        .home-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--border-dark);
        }

        /* Screen Presentation Adaptations */
        @media (max-width: 620px) {
            body {
                overflow-y: auto;
            }
            .main-container {
                flex-direction: column-reverse; 
                gap: 25px;
            }
            .home-btn {
                flex-direction: row;
                padding: 10px 30px;
                font-size: 14px;
                gap: 10px;
            }
            .activity-wrapper {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
            .activity-title {
                text-align: center;
            }
            .photo-frame { 
                margin: 0 auto; 
                width: 110px; 
            }
        }
    </style>

    <script>
        const DISCORD_ID = '748262928955998360'; 
        const canvas = document.getElementById('flower-canvas');
        const ctx = canvas.getContext('2d');
        let petals = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 5 + 3;
                this.speed = Math.random() * 0.8 + 0.4;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.curve = Math.random() * 1.5; 
                const colors = ['#e0c3fc', '#dab6fc', '#cc99ff', '#b388ff', '#9575cd'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.style = Math.floor(Math.random() * 3);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.7; 
                ctx.beginPath();
                if (this.style === 0) { 
                    ctx.ellipse(0, 0, this.size, this.size / 1.8, 0, 0, Math.PI * 2); 
                } else if (this.style === 1) {
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-this.size, -this.size, -this.size, this.size, 0, this.size);
                    ctx.bezierCurveTo(this.size, this.size, this.size, -this.size, 0, 0);
                } else {
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(this.size / 2, this.size, 0, this.size * 2);
                    ctx.quadraticCurveTo(-this.size / 2, this.size, 0, 0);
                }
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 80) * this.curve; 
                this.angle += this.spin;
                if (this.y > canvas.height + 10) this.reset();
            }
        }

        for (let i = 0; i < 60; i++) petals.push(new Petal());

        function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animatePetals);
        }
        animatePetals();

        let activityTimestamp = null;
        let timeTickerInterval = null;

        function formatDuration(ms) {
            if (ms < 0) ms = 0;
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            const hours = Math.floor(minutes / 60);
            if (hours > 0) {
                const remainingMinutes = minutes % 60;
                return `${hours}:${remainingMinutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer(startTimeMs) {
            clearInterval(timeTickerInterval);
            activityTimestamp = startTimeMs;
            const timeBox = document.getElementById("time-box");
            const timeElement = document.getElementById("activity-time");
            
            if (!activityTimestamp) {
                timeBox.style.display = "none";
                return;
            }

            timeBox.style.display = "inline-flex";
            
            const updateTimerText = () => {
                const now = Date.now();
                const elapsed = now - activityTimestamp;
                timeElement.innerText = `${formatDuration(elapsed)} elapsed`;
            };

            updateTimerText();
            timeTickerInterval = setInterval(updateTimerText, 1000);
        }

        // Real-time Activity Stream Architecture (WebSocket Implementation)
        const socket = new WebSocket("wss://api.lanyard.rest/socket");
        const OPCODES = { INFO: 0, HELLO: 1, INITIALIZE: 2, HEARTBEAT: 3 };
        let heartbeatInterval;

        socket.addEventListener("message", (event) => {
            const rawData = JSON.parse(event.data);
            const { op, d } = rawData;

            if (op === OPCODES.HELLO) {
                heartbeatInterval = setInterval(() => {
                    socket.send(JSON.stringify({ op: OPCODES.HEARTBEAT }));
                }, d.heartbeat_interval);

                socket.send(JSON.stringify({
                    op: OPCODES.INITIALIZE,
                    d: { subscribe_to_id: DISCORD_ID }
                }));
            }

            if (op === OPCODES.INFO) {
                updateAllPresenceData(d);
            }
        });

        function updateAllPresenceData(data) {
            // 1. Update Core Profile Details
            if(data.discord_user) {
                document.getElementById('display-name').textContent = data.discord_user.display_name;
                document.getElementById('username').textContent = `@ ${data.discord_user.username}`;
                
                const avatarHash = data.discord_user.avatar;
                const extension = avatarHash.startsWith('a_') ? 'gif' : 'webp';
                document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avatarHash}.${extension}?size=160`;
            }

            // 2. Update Status Dot Colour Indicator
            const statusDot = document.getElementById('status');
            const colors = { online: 'var(--online)', idle: 'var(--idle)', dnd: 'var(--dnd)', offline: 'var(--offline)' };
            statusDot.style.backgroundColor = colors[data.discord_status] || colors.offline;

            // 3. Update Activity Panel Contexts & Track Start Timestamps
            const actTitle = document.getElementById("activity-title");

            if (data.listening_to_spotify && data.spotify) {
                actTitle.innerText = "Listening to Spotify.";
                actTitle.style.color = "var(--text-dark)";
                startTimer(data.spotify.start);
            } else if (data.activities && data.activities.length > 0) {
                // Look specifically for games (type 0)
                const gameActivity = data.activities.find(act => act.type === 0);

                if (gameActivity) {
                    actTitle.innerText = `Playing ${gameActivity.name}.`;
                    actTitle.style.color = "var(--text-dark)";
                    startTimer(gameActivity.timestamps ? gameActivity.timestamps.start : null);
                } else {
                    // Ignores Custom Status (type 4) text and defaults to "just Chilling."
                    actTitle.innerText = "just Chilling.";
                    actTitle.style.color = "var(--text-sub)";
                    clearInterval(timeTickerInterval);
                    document.getElementById("time-box").style.display = "none";
                }
            } else {
                actTitle.innerText = "just Chilling.";
                actTitle.style.color = "var(--text-sub)";
                clearInterval(timeTickerInterval);
                document.getElementById("time-box").style.display = "none";
            }
        }

        socket.addEventListener("close", () => {
            clearInterval(heartbeatInterval);
            clearInterval(timeTickerInterval);
        });

        // Mouse Move Particles
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', function(e) {
                const heart = document.createElement('div');
                heart.innerHTML = `<svg width="20" height="20" viewBox="0 0 512 512"><path fill="#FF728B" d="M196.8 357.7C83.9 553.3-87.7 256 138 256c-225.8 0-54.1-297.3 58.7-101.7-112.9-195.5 230.4-195.5 117.5 0C427.2-41.3 598.8 256 373 256c225.8 0 54.1 297.3-58.7 101.7 112.9 195.5-230.4 195.5-117.5 0z"/><circle fill="#FFEB99" cx="255.7" cy="256" r="59.3"/></svg>`;
                heart.style.position = 'fixed';
                heart.style.left = (e.clientX - 10) + 'px';
                heart.style.top = (e.clientY - 10) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '10000';
                heart.style.transition = 'transform 0.8s, opacity 0.8s';
                document.body.appendChild(heart);
                setTimeout(() => {
                    heart.style.transform = `translateY(-40px) scale(0.2)`;
                    heart.style.opacity = '0';
                }, 50);
                setTimeout(() => heart.remove(), 800);
            });
        }

        // Global Audio Framework
        const clickSound = document.getElementById('click-sound');
        const allLinks = document.querySelectorAll('a');

        allLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.href && !this.href.includes('#')) {
                    e.preventDefault();
                    const targetUrl = this.href;

                    clickSound.currentTime = 0;
                    clickSound.play().catch(o => {});

                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 150); 
                } else {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(o => {});
                }
            });
        });

        window.addEventListener('click', (e) => {
            if (!e.target.closest('a')) {
                clickSound.currentTime = 0;
                clickSound.play().catch(o => {});
            }
        });


    </script>
</body>
</html>
