<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <script>
        // Force the server to load the .html version of whatever the user typed
        const path = window.location.pathname;
        window.location.replace(path + ".html" + window.location.search + window.location.hash);
    </script>
</body>
</html>
